name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_PASSWORD: "Your_strong_Pass123"

jobs:
  # ---------------------------------------------------------------
  # 1) Lint + unit tests (no DB needed) — fast feedback.
  # ---------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check . || true   # report style issues without blocking initially

      - name: Run unit tests
        run: pytest -q

  # ---------------------------------------------------------------
  # 2) Integration: real SQL Server, load data, train, check metrics.
  # ---------------------------------------------------------------
  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Your_strong_Pass123"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_Pass123 -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ODBC driver
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup database + load data
        env:
          DB_SERVER: "localhost,1433"
        run: python scripts/setup_database.py --rows 20000

      - name: Train model on SQL data
        env:
          DB_SERVER: "localhost,1433"
        run: python -m src.train

      - name: Enforce model quality gate
        run: |
          python - <<'PY'
          import json, sys
          m = json.load(open("models/metrics.json"))
          print("metrics:", m)
          assert m["roc_auc"] >= 0.70, f"ROC-AUC {m['roc_auc']:.3f} below 0.70 gate"
          print("Quality gate passed.")
          PY

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: credit-risk-model
          path: |
            models/credit_risk_model.joblib
            models/metrics.json

  # ---------------------------------------------------------------
  # 3) Build & publish Docker image (main branch only).
  # ---------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: credit-risk-model
          path: models

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
